openapi: 3.0.3
info:
  title: UnaHur Anti-Social Net API
  description: |
    API REST del backend para la red social **UnaHur Anti-Social Net**.
    Permite gestionar usuarios, publicaciones, comentarios, etiquetas e imágenes asociadas a posts.
  version: 1.0.0
  contact:
    name: Anti-Social Team

servers:
  - url: http://localhost:3001
    description: Servidor local (puerto configurable vía variable de entorno PORT)

tags:
  - name: Users
    description: Gestión de usuarios registrados
  - name: Posts
    description: Publicaciones y sus relaciones
  - name: Post Images
    description: Imágenes asociadas a publicaciones
  - name: Comments
    description: Comentarios sobre publicaciones
  - name: Tags
    description: Etiquetas de publicaciones

paths:
  /users:
    get:
      tags: [Users]
      summary: Listar todos los usuarios
      operationId: getAllUsers
      responses:
        "200":
          description: Lista de usuarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      tags: [Users]
      summary: Crear un usuario
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreate"
      responses:
        "201":
          description: Usuario creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/ValidationError"
        "409":
          $ref: "#/components/responses/ConflictError"

  /users/{id}:
    parameters:
      - $ref: "#/components/parameters/IdParam"
    get:
      tags: [Users]
      summary: Obtener un usuario por ID
      operationId: getUserById
      responses:
        "200":
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Users]
      summary: Actualizar un usuario
      operationId: updateUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Usuario actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/ConflictError"
    delete:
      tags: [Users]
      summary: Eliminar un usuario
      operationId: deleteUser
      responses:
        "200":
          description: Usuario eliminado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /posts:
    get:
      tags: [Posts]
      summary: Listar publicaciones
      operationId: getAllPosts
      parameters:
        - name: user_id
          in: query
          description: Filtrar publicaciones por ID de usuario
          required: false
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Lista de publicaciones con usuario, imágenes, tags y comentarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PostDetail"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Posts]
      summary: Crear una publicación
      operationId: createPost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostCreate"
      responses:
        "201":
          description: Publicación creada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostDetail"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"

  /posts/{id}:
    parameters:
      - $ref: "#/components/parameters/IdParam"
    get:
      tags: [Posts]
      summary: Obtener una publicación por ID
      description: |
        Devuelve la publicación con sus relaciones. Los comentarios más antiguos
        que X meses (configurable con la variable de entorno MESES) no se incluyen.
      operationId: getPostById
      responses:
        "200":
          description: Publicación encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Posts]
      summary: Actualizar una publicación
      operationId: updatePost
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostUpdate"
      responses:
        "200":
          description: Publicación actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostDetail"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Posts]
      summary: Eliminar una publicación
      operationId: deletePost
      responses:
        "200":
          description: Publicación eliminada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /posts/{id}/images:
    parameters:
      - $ref: "#/components/parameters/IdParam"
    get:
      tags: [Post Images]
      summary: Listar imágenes de una publicación
      operationId: getPostImagesByPost
      responses:
        "200":
          description: Imágenes de la publicación
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PostImage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Post Images]
      summary: Subir una imagen a una publicación
      operationId: createPostImageOnPost
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image]
              properties:
                image:
                  type: string
                  format: binary
                  description: Archivo de imagen (JPEG, PNG o WebP, máx. 5 MB)
      responses:
        "201":
          description: Imagen asociada al post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostImage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /posts/{id}/images/{image_id}:
    parameters:
      - $ref: "#/components/parameters/IdParam"
      - $ref: "#/components/parameters/ImageIdParam"
    patch:
      tags: [Post Images]
      summary: Actualizar una imagen de una publicación
      operationId: updatePostImageOnPost
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
                  description: Nueva imagen (opcional)
      responses:
        "200":
          description: Imagen actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostImage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Post Images]
      summary: Eliminar una imagen de una publicación
      operationId: deletePostImageFromPost
      responses:
        "200":
          description: Imagen eliminada del post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /post-images:
    get:
      tags: [Post Images]
      summary: Listar todas las imágenes de posts
      operationId: getAllPostImages
      responses:
        "200":
          description: Lista de imágenes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PostImage"
    post:
      tags: [Post Images]
      summary: Crear una imagen asociada a un post
      operationId: createPostImage
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [image, postId]
              properties:
                postId:
                  type: integer
                  minimum: 1
                  description: ID de la publicación
                image:
                  type: string
                  format: binary
                  description: Archivo de imagen (JPEG, PNG o WebP, máx. 5 MB)
      responses:
        "201":
          description: Imagen creada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostImage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /post-images/{id}:
    parameters:
      - $ref: "#/components/parameters/IdParam"
    get:
      tags: [Post Images]
      summary: Obtener una imagen por ID
      operationId: getPostImageById
      responses:
        "200":
          description: Imagen encontrada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostImage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Post Images]
      summary: Actualizar una imagen
      operationId: updatePostImage
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                postId:
                  type: integer
                  minimum: 1
                  description: Reasignar imagen a otro post (opcional)
                image:
                  type: string
                  format: binary
                  description: Nueva imagen (opcional)
      responses:
        "200":
          description: Imagen actualizada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PostImage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Post Images]
      summary: Eliminar una imagen
      operationId: deletePostImage
      responses:
        "200":
          description: Imagen eliminada
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /comments:
    get:
      tags: [Comments]
      summary: Listar todos los comentarios
      operationId: getAllComments
      responses:
        "200":
          description: Lista de comentarios con usuario y post
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CommentDetail"
    post:
      tags: [Comments]
      summary: Crear un comentario
      operationId: createComment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentCreate"
      responses:
        "201":
          description: Comentario creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentDetail"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"

  /comments/{id}:
    parameters:
      - $ref: "#/components/parameters/IdParam"
    get:
      tags: [Comments]
      summary: Obtener un comentario por ID
      operationId: getCommentById
      responses:
        "200":
          description: Comentario encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Comments]
      summary: Actualizar un comentario
      operationId: updateComment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommentUpdate"
      responses:
        "200":
          description: Comentario actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommentDetail"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Comments]
      summary: Eliminar un comentario
      operationId: deleteComment
      responses:
        "200":
          description: Comentario eliminado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /tags:
    get:
      tags: [Tags]
      summary: Listar todas las etiquetas
      operationId: getAllTags
      responses:
        "200":
          description: Lista de tags
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tag"
    post:
      tags: [Tags]
      summary: Crear una etiqueta
      operationId: createTag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagCreate"
      responses:
        "201":
          description: Tag creado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "400":
          $ref: "#/components/responses/ValidationError"

  /tags/{id}:
    parameters:
      - $ref: "#/components/parameters/IdParam"
    get:
      tags: [Tags]
      summary: Obtener una etiqueta por ID
      operationId: getTagById
      responses:
        "200":
          description: Tag encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Tags]
      summary: Actualizar una etiqueta
      operationId: updateTag
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagUpdate"
      responses:
        "200":
          description: Tag actualizado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
        "400":
          $ref: "#/components/responses/ValidationError"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Tags]
      summary: Eliminar una etiqueta
      operationId: deleteTag
      responses:
        "200":
          description: Tag eliminado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: Identificador numérico del recurso
      schema:
        type: integer
        minimum: 1
    ImageIdParam:
      name: image_id
      in: path
      required: true
      description: Identificador numérico de la imagen
      schema:
        type: integer
        minimum: 1

  responses:
    BadRequest:
      description: Solicitud inválida
      content:
        application/json:
          schema:
            oneOf:
              - $ref: "#/components/schemas/MessageResponse"
              - $ref: "#/components/schemas/ValidationErrorResponse"
    ValidationError:
      description: Error de validación de datos
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"
    NotFound:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MessageResponse"
    ConflictError:
      description: Conflicto por restricción de unicidad
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    MessageResponse:
      type: object
      properties:
        message:
          type: string
          example: Operación realizada correctamente

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
        error:
          type: string

    ValidationErrorResponse:
      type: object
      properties:
        errores:
          type: array
          items:
            type: object
            properties:
              atributo:
                type: string
              error:
                type: string

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        nickname:
          type: string
          example: juan_perez
        name:
          type: string
          example: Juan
        lastName:
          type: string
          example: Pérez
        email:
          type: string
          format: email
          example: juan@example.com
        password:
          type: string
          writeOnly: true
        birthDate:
          type: string
          format: date-time
        gender:
          type: string
          enum: [femenino, Femenino, masculino, Masculino, otro, Otro]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserCreate:
      type: object
      required: [nickname, name, lastName, email, password, birthDate, gender]
      properties:
        nickname:
          type: string
          minLength: 3
          maxLength: 30
          pattern: "^[a-zA-Z0-9_.-]+$"
        name:
          type: string
          minLength: 2
          maxLength: 100
        lastName:
          type: string
          minLength: 2
          maxLength: 100
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
          pattern: "^[a-zA-Z0-9_.-]+$"
        birthDate:
          type: string
          format: date
        gender:
          type: string
          enum: [femenino, Femenino, masculino, Masculino, otro, Otro]

    UserUpdate:
      type: object
      minProperties: 1
      properties:
        nickname:
          type: string
          minLength: 3
          maxLength: 30
        name:
          type: string
          minLength: 2
          maxLength: 100
        lastName:
          type: string
          minLength: 2
          maxLength: 100
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
        birthDate:
          type: string
          format: date
        gender:
          type: string
          enum: [femenino, Femenino, masculino, Masculino, otro, Otro]

    PostCreate:
      type: object
      required: [description, user_id]
      properties:
        description:
          type: string
          minLength: 1
          maxLength: 5000
        user_id:
          type: integer
          minimum: 1
        tags:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 50

    PostUpdate:
      type: object
      minProperties: 1
      properties:
        description:
          type: string
          minLength: 1
          maxLength: 5000
        tags:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 50

    PostDetail:
      type: object
      properties:
        id:
          type: integer
        description:
          type: string
        user_id:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        user:
          $ref: "#/components/schemas/UserSummary"
        postImages:
          type: array
          items:
            $ref: "#/components/schemas/PostImage"
        tags:
          type: array
          items:
            $ref: "#/components/schemas/Tag"
        comments:
          type: array
          items:
            $ref: "#/components/schemas/CommentSummary"

    UserSummary:
      type: object
      properties:
        id:
          type: integer
        nickname:
          type: string
        name:
          type: string
        lastName:
          type: string

    PostImage:
      type: object
      properties:
        id:
          type: integer
        url:
          type: string
          format: uri
          example: http://localhost:3001/uploads/posts/imagen.jpg
        post_id:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CommentCreate:
      type: object
      required: [content, post_id, user_id]
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 150
        post_id:
          type: integer
          minimum: 1
        user_id:
          type: integer
          minimum: 1

    CommentUpdate:
      type: object
      minProperties: 1
      properties:
        content:
          type: string
          minLength: 1
          maxLength: 150

    CommentSummary:
      type: object
      properties:
        id:
          type: integer
        content:
          type: string

    CommentDetail:
      type: object
      properties:
        id:
          type: integer
        content:
          type: string
        user_id:
          type: integer
        post_id:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        monthsOld:
          type: integer
          description: Meses transcurridos desde la creación (campo virtual)
        user:
          $ref: "#/components/schemas/UserSummary"
        post:
          type: object
          properties:
            id:
              type: integer
            description:
              type: string

    Tag:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TagCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 25

    TagUpdate:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 25
